<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Screen Weather Map</title>
    
    <!-- Leaflet CSS and JS for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Map Container - Full screen -->
    <div id="weather-map"></div>
    
    <!-- Weather Info Overlay -->
    <div class="weather-overlay">
        <div class="overlay-header">
            <h1>Weather Map</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn">Search</button>
            </div>
        </div>

        <div class="weather-info" id="weather-info">
            <div class="loading" id="loading">Loading...</div>
            <div class="error" id="error"></div>
            
            <div class="weather-details" id="weather-details">
                <h2 id="city-name"></h2>
                <div class="temperature" id="temperature"></div>
                <div class="description" id="description"></div>
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity"></span>
                    </div>
                    <div class="detail-item">
                        <span class="label">Wind Speed</span>
                        <span class="value" id="wind-speed"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Attribution -->
    <div class="map-attribution">
        Weather data © OpenWeatherMap | Map data © OpenStreetMap contributors
    </div>

    <!-- Your custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
